name: Deploy Worker

on:
  push:
    branches: [main]
    paths: [worker/**]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Ensure bindings + apply migrations
        run: npm run ensure:bindings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set AISSTREAM_API_KEY secret
        run: echo "${{ secrets.AISSTREAM_API_KEY }}" | npx wrangler secret put AISSTREAM_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Lets the global scan trigger the trail-precompute workflow on completion
      # (workflow_dispatch). Optional — without it, the precompute cron still runs
      # hourly. Set the GH_DISPATCH_TOKEN secret to a PAT with `actions:write`.
      - name: Set GITHUB_DISPATCH_TOKEN secret
        run: |
          if [ -n "$GH_DISPATCH_TOKEN" ]; then
            echo "$GH_DISPATCH_TOKEN" | npx wrangler secret put GITHUB_DISPATCH_TOKEN
          else
            echo "GH_DISPATCH_TOKEN not set — skipping (precompute cron fallback still runs)."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
